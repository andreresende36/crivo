name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest --tb=short -x
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TELEGRAM_BOT_TOKEN: "0:ci-placeholder-token"
          APP_ENV: test
          TEST_MODE: "true"

  build-types:
    name: Build @crivo/types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @crivo/types
        run: pnpm --filter "@crivo/types" build

      - name: Lint @crivo/types
        run: pnpm --filter "@crivo/types" exec tsc --noEmit

  build-admin:
    name: Build @crivo/admin
    runs-on: ubuntu-latest
    needs: build-types
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @crivo/types
        run: pnpm --filter "@crivo/types" build

      - name: Type-check admin
        run: pnpm --filter "@crivo/admin" exec tsc --noEmit

      - name: Build admin
        run: pnpm --filter "@crivo/admin" build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
