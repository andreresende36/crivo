[project]
name = "crivo-types"
version = "0.1.0"
description = "Pydantic types gerados do schema Supabase do Crivo"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["crivo_types"]
