[project]
name = "crivo"
version = "0.1.0"
description = "Crivo — Scraping, análise e publicação de ofertas"
requires-python = ">=3.11"
dependencies = [
    "crivo-types",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
    "playwright>=1.44",
    "pydantic>=2.7",
    "python-dotenv>=1.0",
    "supabase>=2.4",
    "redis>=5.0",
    "anthropic>=0.28",
    "python-telegram-bot>=21.0",
    "bcrypt>=4.1",
    "Pillow>=10.3",
    "pytz>=2024.1",
    "structlog>=24.0",
    "tenacity>=9.0",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "fake-useragent>=1.5",
    "playwright-stealth>=1.0",
]

[project.scripts]
crivo-scraper = "crivo.workers.scraper_worker:main"
crivo-sender = "crivo.workers.sender_worker:main"
crivo-api = "crivo.workers.api_worker:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["crivo"]

[tool.pyright]
pythonVersion = "3.11"
venvPath = "../.."
venv = ".venv"
extraPaths = ["."]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
addopts = "--tb=short"
