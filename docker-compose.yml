# =============================================================================
# Crivo — Docker Compose
# Serviços: app (scraper+sender+api), admin (Next.js)
# Uso: docker compose up -d
# =============================================================================

networks:
  net:
    driver: bridge

volumes:
  crivo_data:

services:

  # ---------------------------------------------------------------------------
  # Crivo — Aplicação principal (scraper + sender + API na porta 8000)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crivo_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - crivo_data:/app/data
      - ./src:/app/src:ro
      - ./logs:/app/logs
    networks:
      - net
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "from src.config import settings; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Admin — Painel Next.js (porta 3000)
  # Acesso: http://localhost:3000
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: crivo_admin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=http://app:8000
    networks:
      - net
    depends_on:
      - app

