version: "3.9"

# =============================================================================
# DealHunter — Docker Compose
# Serviços: dealhunter app, n8n (orquestrador)
# Uso: docker compose up -d
# =============================================================================

networks:
  dealhunter_net:
    driver: bridge

volumes:
  n8n_data:
  dealhunter_data:

services:

  # ---------------------------------------------------------------------------
  # DealHunter — Aplicação principal
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dealhunter_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - dealhunter_data:/app/data
      - ./src:/app/src:ro           # Hot-reload em dev (read-only em prod)
      - ./logs:/app/logs
    networks:
      - dealhunter_net
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "from src.config import settings; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # n8n — Orquestração de workflows / webhooks
  # Acesso: http://localhost:5678
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: dealhunter_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro
    networks:
      - dealhunter_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

